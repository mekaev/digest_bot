<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page_title %}{{ page_title }} - {% endif %}AI Telegram Digest Bot</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --surface: #ffffff;
            --surface-muted: #eef3ff;
            --border: #d7deef;
            --text: #172033;
            --text-soft: #52607a;
            --accent: #1f5eff;
            --accent-strong: #0f3ec7;
            --success: #dff7e7;
            --success-text: #18643b;
            --danger: #fde8e8;
            --danger-text: #8b1e1e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #f8faff 0%, var(--bg) 100%);
            color: var(--text);
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .shell {
            width: min(1040px, calc(100vw - 32px));
            margin: 0 auto;
        }

        .topbar {
            padding: 20px 0;
        }

        .topbar-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(215, 222, 239, 0.9);
            border-radius: 18px;
            backdrop-filter: blur(10px);
        }

        .brand {
            font-weight: 700;
            color: var(--text);
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            font-size: 0.95rem;
        }

        .nav-note {
            color: var(--text-soft);
        }

        main {
            padding-bottom: 40px;
        }

        .hero,
        .card,
        .stack {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(29, 45, 86, 0.08);
        }

        .hero {
            padding: 36px;
        }

        .card {
            padding: 24px;
        }

        .stack {
            padding: 0;
            overflow: hidden;
        }

        .stack + .stack,
        .card + .card,
        .hero + .card {
            margin-top: 20px;
        }

        h1, h2, h3 {
            margin: 0 0 12px;
        }

        p {
            margin: 0 0 12px;
            color: var(--text-soft);
            line-height: 1.6;
        }

        .button,
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 0;
            border-radius: 12px;
            background: var(--accent);
            color: #fff;
            padding: 10px 16px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        .button.secondary,
        button.secondary {
            background: #e7edff;
            color: var(--accent-strong);
        }

        .button:hover,
        button:hover {
            background: var(--accent-strong);
            text-decoration: none;
        }

        .button.secondary:hover,
        button.secondary:hover {
            background: #d8e3ff;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge.success {
            background: var(--success);
            color: var(--success-text);
        }

        .badge.muted {
            background: #eef1f6;
            color: var(--text-soft);
        }

        .alert {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 14px;
        }

        .alert.error {
            background: var(--danger);
            color: var(--danger-text);
        }

        .grid {
            display: grid;
            gap: 16px;
        }

        .grid.two {
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }

        .metric {
            padding: 18px;
            border-radius: 18px;
            background: var(--surface-muted);
            border: 1px solid #dbe5ff;
        }

        .metric strong {
            display: block;
            font-size: 1.6rem;
            margin-bottom: 4px;
        }

        .form-stack {
            display: grid;
            gap: 12px;
        }

        label {
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font: inherit;
        }

        .digest-card,
        .channel-row {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
        }

        .digest-card:first-child,
        .channel-row:first-child {
            border-top: 0;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            color: var(--text-soft);
            font-size: 0.92rem;
        }

        .digest-body {
            margin: 0;
            white-space: pre-wrap;
            color: var(--text);
            line-height: 1.6;
        }

        .channel-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .channel-copy h3 {
            margin-bottom: 6px;
        }

        .channel-copy p:last-child {
            margin-bottom: 0;
        }

        .topic-block + .topic-block {
            margin-top: 20px;
        }

        .topic-header {
            padding: 22px 24px 0;
        }

        @media (max-width: 720px) {
            .hero,
            .card {
                padding: 24px;
            }

            .channel-row {
                flex-direction: column;
            }

            .topbar-inner {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="shell topbar-inner">
            <a class="brand" href="/">AI Telegram Digest Bot</a>
            <nav class="nav">
                {% if current_user %}
                    <span class="nav-note">
                        {{ current_user.display_name or current_user.username or ("User #" ~ current_user.id) }}
                    </span>
                    <a href="/app">Profile</a>
                    <a href="/app/digests">Digests</a>
                    <a href="/app/subscriptions">Subscriptions</a>
                {% else %}
                    <a href="/login">Login</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main class="shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
